<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>台電換表助手 Team V1</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode" defer></script>
</head>
<body>
<header>
  <h1>台電換表助手 Team V1</h1>
  <div id="net">未登入</div>
</header>

<main>
  <section id="loginCard" class="card">
    <h2>工程師登入</h2>
    <input id="username" placeholder="帳號，例如 A001">
    <input id="password" type="password" placeholder="密碼">
    <button id="loginBtn">登入</button>
    <p class="hint">帳號 A001～A010，密碼預設 1234。</p>
  </section>

  <section id="appCard" class="hidden">
    <section class="card">
      <div class="top">
        <div>
          <b>工程師：</b><span id="engineerName"></span><br>
          <b>今日已掃：</b><span id="todayCount">0</span> 筆
        </div>
        <button class="gray small" id="logoutBtn">登出</button>
      </div>
    </section>

    <section class="card">
      <h2>掃描新電表 QR Code</h2>
      <div id="reader"></div>
      <div class="grid2">
        <button id="startBtn">啟用相機掃描</button>
        <button class="gray" id="stopBtn">停止掃描</button>
      </div>

      <label>QR 原始內容</label>
      <textarea id="qrRaw" rows="3" placeholder="掃描後自動帶入，也可手動貼上"></textarea>

      <div class="grid2">
        <button class="gray" id="parseBtn">解析 QR</button>
        <button class="red" id="clearFormBtn">清空欄位</button>
      </div>

      <label>新電表號碼</label>
      <input id="meterNo" placeholder="例如 1010111">

      <label>檢驗 / 檢定號碼</label>
      <input id="verifyNo" placeholder="例如 111612">

      <label>備註</label>
      <input id="note" placeholder="可空白">

      <button id="uploadBtn">上傳到 Excel / Google 試算表</button>
      <p class="hint">成功上傳後會自動清空欄位，準備掃下一顆電錶。</p>
    </section>

    <section class="card">
      <h2>本機紀錄</h2>
      <div class="grid2">
        <button class="gray" id="exportCsvBtn">匯出 CSV</button>
        <button class="red" id="clearLocalBtn">清除本機紀錄</button>
      </div>
      <div id="localList"></div>
    </section>
  </section>
</main>

<footer>手機版：登入 → 掃 QR → 上傳 Google 試算表</footer>
<script src="app.js"></script>
</body>
</html>
